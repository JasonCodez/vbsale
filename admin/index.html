<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Product Catalogue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    body { background: #0D1B2A; display:flex; align-items:center; justify-content:center; min-height:100vh; }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 44px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .login-logo svg { width: 36px; height: 36px; }

    .login-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1E293B;
    }

    .login-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 0.875rem;
      color: #64748B;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #64748B;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E2E8F0;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #1E293B;
      background: #F8FAFC;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #14B8A6;
      box-shadow: 0 0 0 3px rgba(20,184,166,0.12);
      background: white;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #14B8A6, #0F766E);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(20,184,166,0.3);
    }

    .login-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(20,184,166,0.4); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #B91C1C;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.83rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.83rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: white; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 32 32" fill="none">
          <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="#14B8A6" opacity="0.15"/>
          <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="none" stroke="#14B8A6" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="4" fill="#14B8A6"/>
        </svg>
        <span class="login-logo-text">Admin Panel</span>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to manage your product catalogue.</p>

      <div class="error-msg" id="error-msg">Invalid username or password.</div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>
    </div>
    <a href="/" class="back-link">← Back to catalogue</a>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.isAdmin) window.location.href = '/admin/dashboard.html';
    });

    const form    = document.getElementById('login-form');
    const errMsg  = document.getElementById('error-msg');
    const btn     = document.getElementById('login-btn');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errMsg.classList.remove('show');

      const body = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/admin/dashboard.html';
        } else {
          errMsg.textContent = data.error || 'Invalid credentials.';
          errMsg.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        errMsg.textContent = 'Could not connect to server.';
        errMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
